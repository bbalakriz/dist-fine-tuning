function ModelSpec() {
  return (
    <div className="flex flex-wrap gap-3 justify-center mb-6">
      {[
        { label:'Model', value: MODEL.name, color:'#3b82f6' },
        { label:'Params', value: MODEL.params, color:'#8b5cf6' },
        { label:'Layers', value: MODEL.layers, color:'#10b981' },
        { label:'FP16 Size', value:`${MODEL.fp16Size} GB`, color:'#f59e0b' },
        { label:'GPU', value: MODEL.gpuName, color:'#06b6d4' },
        { label:'VRAM', value:`${MODEL.gpuVRAM} GB`, color:'#ef4444' },
        { label:'GPUs', value:`${MODEL.numGPUs}×`, color:'#ec4899' },
      ].map(s => (
        <div key={s.label} className="flex items-center gap-2 px-3 py-1.5 rounded-lg mono text-xs" style={{ background:'rgba(15,23,42,0.8)', border:`1px solid ${s.color}33` }}>
          <span className="opacity-50">{s.label}</span>
          <span style={{ color: s.color }} className="font-semibold">{s.value}</span>
        </div>
      ))}
    </div>
  );
}

function Legend() {
  return (
    <div className="flex flex-wrap gap-4 justify-center py-3 px-4 rounded-xl" style={{ background:'rgba(15,23,42,0.6)' }}>
      {Object.entries(COLORS).filter(([k]) => !['comm','temp'].includes(k)).map(([key, c]) => (
        <div key={key} className="flex items-center gap-2 text-xs">
          <div className="w-3 h-3 rounded-sm" style={{ background: c.bg }} />
          <span className="opacity-70">{c.label}</span>
        </div>
      ))}
      <div className="flex items-center gap-2 text-xs">
        <div className="w-3 h-3 rounded-sm border-2 border-dashed" style={{ borderColor:'#64748b', background:'transparent' }} />
        <span className="opacity-70">Temporary (gathered)</span>
      </div>
    </div>
  );
}

function TabBar({ mode, setMode, setStep }) {
  const tabs = [
    { id:'ddp',      label:'DDP',       subtitle:'Distributed Data Parallel', icon:'⊞' },
    { id:'fsdp',     label:'FSDP',      subtitle:'Fully Sharded Data Parallel', icon:'⊟' },
    { id:'bnb_ddp',  label:'QLoRA+DDP', subtitle:'4-bit + LoRA + DDP', icon:'◈' },
    { id:'bnb_fsdp', label:'QLoRA+FSDP',subtitle:'4-bit + LoRA + FSDP', icon:'◉' },
    { id:'compare',  label:'Compare',   subtitle:'All Approaches', icon:'⊜' },
  ];
  return (
    <div className="flex gap-1.5 justify-center mb-8 flex-wrap">
      {tabs.map(t => (
        <button key={t.id} onClick={() => { setMode(t.id); setStep(0); }}
          className="px-4 py-2.5 rounded-xl text-sm font-medium transition-all duration-300 cursor-pointer"
          style={{
            background: mode === t.id ? 'rgba(59,130,246,0.15)' : 'rgba(15,23,42,0.4)',
            border: `1px solid ${mode === t.id ? 'rgba(59,130,246,0.5)' : 'rgba(30,41,59,0.5)'}`,
            color: mode === t.id ? '#93c5fd' : '#64748b',
            boxShadow: mode === t.id ? '0 0 20px rgba(59,130,246,0.1)' : 'none',
          }}>
          <span className="mr-1.5 text-base">{t.icon}</span>
          <span className="font-semibold">{t.label}</span>
          <span className="ml-1.5 opacity-50 text-xs hidden lg:inline">{t.subtitle}</span>
        </button>
      ))}
    </div>
  );
}

function StepTimeline({ steps, currentStep, setStep }) {
  return (
    <div className="flex items-center justify-center gap-1 mb-6 flex-wrap">
      {steps.map((s, i) => (
        <React.Fragment key={i}>
          <button onClick={() => setStep(i)}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs transition-all cursor-pointer whitespace-nowrap"
            style={{
              background: i === currentStep ? 'rgba(59,130,246,0.2)' : i < currentStep ? 'rgba(16,185,129,0.1)' : 'rgba(15,23,42,0.4)',
              border: `1px solid ${i === currentStep ? 'rgba(59,130,246,0.5)' : i < currentStep ? 'rgba(16,185,129,0.3)' : 'rgba(30,41,59,0.3)'}`,
              color: i === currentStep ? '#93c5fd' : i < currentStep ? '#6ee7b7' : '#475569',
            }}>
            <span className="mono font-semibold" style={{ fontSize:'10px' }}>{i+1}</span>
            <span className="hidden md:inline">{s.title.replace(/Step \d+: /, '')}</span>
          </button>
          {i < steps.length - 1 && <div className="w-3 h-px" style={{ background:'#1e293b' }} />}
        </React.Fragment>
      ))}
    </div>
  );
}

function ContentBlock({ item }) {
  const c = COLORS[item.type] || COLORS.temp;
  const isTemp = item.temp;
  return (
    <div className="flex items-center gap-1.5 px-2 py-1 rounded-md text-xs mono"
      style={{
        background: isTemp ? 'transparent' : c.bgLight,
        border: isTemp ? `1.5px dashed ${c.border}` : `1px solid ${c.border}`,
        maxWidth: '100%', opacity: isTemp ? 0.6 : 1,
      }}>
      <div className="w-2 h-2 rounded-sm flex-shrink-0" style={{ background: isTemp ? 'transparent' : c.bg, border: isTemp ? `1px solid ${c.bg}` : 'none' }} />
      <span className="truncate" style={{ color: c.bg, fontSize:'10px' }}>{item.label}</span>
      {item.size && <span className="opacity-50 flex-shrink-0" style={{ fontSize:'9px' }}>{item.size}</span>}
    </div>
  );
}

function GPUCard({ index, contents, memory, status, vram }) {
  const total = memory.p + memory.g + memory.o + memory.a;
  const isOOM = total > vram;
  const statusClass = status === 'error' ? 'gpu-error' : status === 'success' ? 'gpu-success' : 'gpu-active';
  return (
    <div className={`rounded-xl p-3 transition-all duration-300 ${statusClass}`}
      style={{ background:'#0f1729', border:`1px solid ${isOOM ? 'rgba(239,68,68,0.4)' : status === 'success' ? 'rgba(34,197,94,0.3)' : 'rgba(30,58,138,0.3)'}`, minWidth:0 }}>
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2">
          <div className="w-2.5 h-2.5 rounded-full" style={{ background: GPU_COLORS[index] }} />

// ── Adam Explainer (expandable) ──────────────────────────────────────────
function AdamExplainer() {
  const [open, setOpen] = useState(false);
  return (
    <div className="rounded-xl mb-4 overflow-hidden" style={{ background:'rgba(245,158,11,0.05)', border:'1px solid rgba(245,158,11,0.2)' }}>
      <button onClick={() => setOpen(!open)} className="w-full px-4 py-3 flex items-center justify-between cursor-pointer text-left" style={{ background:'rgba(245,158,11,0.08)' }}>
        <div className="flex items-center gap-2">
          <span style={{ color:'#f59e0b', fontSize:'14px' }}>{open ? '▼' : '▶'}</span>
          <span className="font-semibold text-sm" style={{ color:'#f59e0b' }}>What is Adam (Adaptive Moment Estimation)?</span>
        </div>
        <span className="text-xs opacity-40">{open ? 'collapse' : 'expand'}</span>
      </button>
      {open && (
        <div className="px-4 py-4 space-y-4 fade-in">
          <div>
            <div className="text-xs font-semibold mb-2 opacity-70">Why Not Simple SGD?</div>
            <div className="text-xs opacity-70 leading-relaxed">
              Simple Stochastic Gradient Descent (SGD) uses a single learning rate for all parameters. For a large model like Qwen2.5-7B with 7 billion parameters, different parameters need different learning rates. Some parameters have stable, consistent gradients and can tolerate larger updates, while others have noisy, volatile gradients and need smaller, more cautious updates.
            </div>
          </div>
          <div>
            <div className="text-xs font-semibold mb-2 opacity-70">How Adam Solves This</div>
            <div className="text-xs opacity-70 leading-relaxed">
              Adam maintains <strong>two running averages per parameter</strong>:
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2">
              <div className="rounded-lg p-3" style={{ background:'rgba(245,158,11,0.08)', border:'1px solid rgba(245,158,11,0.15)' }}>
                <div className="text-xs font-semibold mb-1" style={{ color:'#fbbf24' }}>1st Moment "m" (Momentum)</div>
                <div className="text-xs opacity-60">Exponential moving average of gradients. Acts as momentum — smooths out noisy gradient directions so the optimizer doesn't oscillate.</div>
              </div>
              <div className="rounded-lg p-3" style={{ background:'rgba(245,158,11,0.08)', border:'1px solid rgba(245,158,11,0.15)' }}>
                <div className="text-xs font-semibold mb-1" style={{ color:'#fbbf24' }}>2nd Moment "v" (Variance)</div>
                <div className="text-xs opacity-60">Exponential moving average of squared gradients. Adapts the learning rate per-parameter — parameters with large or noisy gradients get smaller updates.</div>
              </div>
            </div>
          </div>
          <div className="rounded-lg p-3" style={{ background:'rgba(6,182,212,0.07)', border:'1px solid rgba(6,182,212,0.15)' }}>
            <div className="text-xs font-semibold mb-2" style={{ color:'#22d3ee' }}>Simple Example — 2 Parameters Over 4 Steps</div>
            <div className="mono text-xs opacity-70 space-y-1" style={{ fontSize:'10px' }}>
              <div>Param A gradients: [0.10, 0.12, 0.11, 0.09] <span className="opacity-40">← stable, consistent</span></div>
              <div>Param B gradients: [2.00, -1.50, 3.00, -2.50] <span className="opacity-40">← noisy, volatile</span></div>
              <div className="pt-2"><span style={{ color:'#ef4444' }}>SGD (lr=0.01):</span> Same step size for both. A moves too slow, B oscillates wildly.</div>
              <div className="pt-1"><span style={{ color:'#22c55e' }}>Adam:</span> Sees A is stable (low variance) → larger effective lr → faster convergence.</div>
              <div>{'           '}Sees B is noisy (high variance) → smaller effective lr → dampened oscillation.</div>
            </div>
          </div>
          <div className="rounded-lg p-3" style={{ background:'rgba(239,68,68,0.06)', border:'1px solid rgba(239,68,68,0.15)' }}>
            <div className="text-xs font-semibold mb-1" style={{ color:'#ef4444' }}>The Memory Cost</div>
            <div className="text-xs opacity-70 leading-relaxed">
              Each of the 7B parameters needs <strong>two extra fp32 values</strong> (m and v): 7B × 4 bytes × 2 = <strong>56 GB</strong> of optimizer state alone. This often dominates the total memory budget, exceeding even the model parameters themselves.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function StepNav({ step, maxStep, setStep, playing, setPlaying }) {
  return (
    <div className="flex items-center justify-center gap-3 mt-6">
      <button onClick={() => setStep(Math.max(0, step-1))} disabled={step===0} className="px-4 py-2 rounded-lg mono text-sm font-medium transition-all cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed" style={{ background:'rgba(15,23,42,0.6)', border:'1px solid #1e293b' }}>Previous</button>
      <button onClick={() => setPlaying(!playing)} className="px-4 py-2 rounded-lg mono text-sm font-medium transition-all cursor-pointer" style={{ background: playing ? 'rgba(239,68,68,0.15)' : 'rgba(59,130,246,0.15)', border:`1px solid ${playing ? 'rgba(239,68,68,0.3)' : 'rgba(59,130,246,0.3)'}`, color: playing ? '#ef4444' : '#93c5fd' }}>{playing ? 'Pause' : 'Auto-Play'}</button>
      <button onClick={() => setStep(Math.min(maxStep, step+1))} disabled={step===maxStep} className="px-4 py-2 rounded-lg mono text-sm font-medium transition-all cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed" style={{ background:'rgba(59,130,246,0.1)', border:'1px solid rgba(59,130,246,0.3)', color:'#93c5fd' }}>Next</button>
    </div>
  );
}

// ── Main Step View ───────────────────────────────────────────────────────
function StepView({ steps, mode }) {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  useEffect(() => { setStep(0); setPlaying(false); }, [mode]);
  useEffect(() => {
    if (!playing) return;
    const timer = setInterval(() => { setStep(prev => { if (prev >= steps.length-1) { setPlaying(false); return prev; } return prev+1; }); }, 3500);
    return () => clearInterval(timer);
  }, [playing, steps.length]);

  const s = steps[step];
  const modeColor = MODE_COLORS[mode] || '#3b82f6';

  return (
    <div className="fade-in">
      <StepTimeline steps={steps} currentStep={step} setStep={setStep} />
      <div className="text-center mb-5">
        <h2 className="text-xl font-bold mb-1" style={{ color: modeColor }}>{s.title}</h2>
        <p className="text-sm opacity-60">{s.subtitle}</p>
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-3" key={step}>
        {[0,1,2,3].map(i => <GPUCard key={i} index={i} contents={s.gpuContents[i]} memory={s.memory[i]} status={s.status[i]} vram={MODEL.gpuVRAM} />)}
      </div>
      <CommOverlay type={s.commType} />
      {s.showAdam && <AdamExplainer />}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-4" key={`info-${step}`}>
        <div className="rounded-xl p-5 fade-in" style={{ background:'#0c1220', border:'1px solid #1e293b' }}>
          <div className="text-xs font-semibold mb-2 opacity-50 uppercase tracking-wider">What's Happening</div>
          <div className="text-sm leading-relaxed opacity-80 whitespace-pre-line mb-4">{s.description}</div>
          <div className="rounded-lg p-3 mb-3" style={{ background:'rgba(139,92,246,0.07)', border:'1px solid rgba(139,92,246,0.2)' }}>
            <div className="text-xs font-semibold mb-1" style={{ color:'#a78bfa' }}>Key Insight</div>
            <div className="text-xs opacity-70 leading-relaxed">{s.detail}</div>
          </div>
          <div className="rounded-lg p-3" style={{ background:'rgba(6,182,212,0.07)', border:'1px solid rgba(6,182,212,0.2)' }}>
            <div className="mono text-xs" style={{ color:'#22d3ee', fontSize:'11px' }}>{s.formula}</div>
          </div>
        </div>
        <MemoryDetail memories={s.memory} vram={MODEL.gpuVRAM} />
      </div>
      <StepNav step={step} maxStep={steps.length-1} setStep={setStep} playing={playing} setPlaying={setPlaying} />
    </div>
  );
}

                <div className="flex gap-3">
                  <span className="mono" style={{ fontSize:'8px', color:COLORS.params.bg }}>P:{a.p}GB</span>
                  {a.g > 0 && <span className="mono" style={{ fontSize:'8px', color:COLORS.grads.bg }}>G:{a.g}GB</span>}
                  <span className="mono" style={{ fontSize:'8px', color:COLORS.optimizer.bg }}>O:{a.o > 0 ? a.o+'GB' : 'CPU'}</span>
                  {a.a > 0 && <span className="mono" style={{ fontSize:'8px', color:COLORS.activations.bg }}>A:{a.a}GB</span>}
                </div>
                <span className="mono opacity-40" style={{ fontSize:'8px' }}>{a.note}</span>
              </div>
            </div>
          );
        })}
      </div>

      {/* Reduction stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {[
          { label:'DDP → FSDP', value:'4×', color:'#f59e0b', detail:'84 → 21 GB' },
          { label:'DDP → FSDP+Off', value:'12×', color:'#06b6d4', detail:'84 → 7 GB' },
          { label:'DDP → QLoRA+DDP', value:'12×', color:'#ec4899', detail:'84 → 7.1 GB' },
          { label:'DDP → QLoRA+FSDP', value:'25×', color:'#8b5cf6', detail:'84 → 3.3 GB' },
        ].map((item, i) => (
          <div key={i} className="rounded-xl p-3 text-center" style={{ background:'#0f1729', border:`1px solid ${item.color}22` }}>
            <div className="text-2xl font-bold" style={{ color:item.color }}>{item.value}</div>
            <div className="text-xs opacity-50 mt-1">{item.label}</div>
            <div className="mono opacity-30 mt-0.5" style={{ fontSize:'9px' }}>{item.detail}</div>
          </div>
        ))}
      </div>

      {/* Key Differences Table */}
      <div className="rounded-xl overflow-hidden" style={{ border:'1px solid #1e293b' }}>
        <div className="px-4 py-3 font-semibold text-sm" style={{ background:'#0f1729' }}>Key Differences</div>
        <div className="overflow-x-auto">
          <table className="w-full text-xs" style={{ minWidth:'700px' }}>
            <thead>
              <tr style={{ background:'#0c1220' }}>
                <th className="text-left px-3 py-2 opacity-50 font-medium">Aspect</th>
                <th className="text-left px-3 py-2 font-medium" style={{ color:'#f59e0b' }}>DDP</th>
                <th className="text-left px-3 py-2 font-medium" style={{ color:'#3b82f6' }}>FSDP</th>
                <th className="text-left px-3 py-2 font-medium" style={{ color:'#ec4899' }}>QLoRA+DDP</th>
                <th className="text-left px-3 py-2 font-medium" style={{ color:'#8b5cf6' }}>QLoRA+FSDP</th>
              </tr>
            </thead>
            <tbody className="mono" style={{ fontSize:'10px' }}>
              {[
                ['Model on GPU', 'Full fp16 (14GB)', '1/W shard fp16 (3.5GB)', 'Full 4-bit (3.5GB)', '1/W shard 4-bit (0.9GB)'],
                ['Trainable params', 'All 7B', 'All 7B', '160M LoRA (2.3%)', '160M LoRA (2.3%)'],
                ['Peak memory/GPU', '84 GB', '21 GB', '7.1 GB', '3.3 GB'],
                ['Gradient sync', 'AllReduce (14 GB)', 'Reduce-Scatter', 'AllReduce (0.3 GB)', 'Reduce-Scatter (tiny)'],
                ['Fits on T4?', 'No', 'With offload', 'Yes', 'Yes, with headroom'],
                ['Best for', 'Small models', 'Full fine-tune large', 'Efficient fine-tune', 'Max efficiency'],
              ].map(([aspect, ...vals], i) => (
                <tr key={i} style={{ background: i%2===0 ? '#0c1220' : '#0f1729' }}>
                  <td className="px-3 py-2 opacity-60 font-sans text-xs">{aspect}</td>
                  {vals.map((v, j) => <td key={j} className="px-3 py-2 opacity-80">{v}</td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Formulas */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="rounded-xl p-5" style={{ background:'rgba(245,158,11,0.05)', border:'1px solid rgba(245,158,11,0.15)' }}>
          <div className="text-sm font-semibold mb-3" style={{ color:'#f59e0b' }}>DDP Memory Formula</div>
          <div className="mono text-xs space-y-1 opacity-80" style={{ fontSize:'11px' }}>
            <div>Per GPU = N×2 <span className="opacity-40">(fp16 params)</span></div>
            <div>{'       '}+ N×2 <span className="opacity-40">(fp16 grads)</span></div>
            <div>{'       '}+ N×8 <span className="opacity-40">(fp32 Adam: m + v)</span></div>
            <div className="pt-1 font-semibold" style={{ color:'#f59e0b' }}>{'       '}= N × 12 bytes = 84 GB</div>
          </div>
        </div>
        <div className="rounded-xl p-5" style={{ background:'rgba(236,72,153,0.05)', border:'1px solid rgba(236,72,153,0.15)' }}>
          <div className="text-sm font-semibold mb-3" style={{ color:'#ec4899' }}>QLoRA + DDP Peak Memory</div>
          <div className="mono text-xs space-y-1 opacity-80" style={{ fontSize:'11px' }}>
            <div>Peak = N×0.5 <span className="opacity-40">(4-bit base, frozen)</span></div>
            <div>{'      '}+ L×2 <span className="opacity-40">(fp16 LoRA, L=160M)</span></div>
            <div>{'      '}+ L×8 <span className="opacity-40">(Adam for LoRA only)</span></div>
            <div>{'      '}+ ~2 GB <span className="opacity-40">(activations at peak)</span></div>
            <div className="pt-1 font-semibold" style={{ color:'#ec4899' }}>{'      '}= 3.5 + 0.3 + 1.3 + 2.0 = 7.1 GB</div>
            <div className="opacity-40 pt-1" style={{ fontSize:'9px' }}>Grads (0.3 GB) grow as activations shrink — never fully coexist</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════

function App() {
  const [mode, setMode] = useState('ddp');
  const [step, setStep] = useState(0);
  return (
    <div className="relative z-10 max-w-6xl mx-auto px-4 py-8">
      <div className="text-center mb-6">
        <h1 className="text-2xl md:text-3xl font-bold mb-2">
          <span style={{ color:'#f59e0b' }}>Distributed Data Parallel</span>
          <span className="opacity-30 mx-2">vs</span>
          <span style={{ color:'#3b82f6' }}>Fully Sharded Data Parallel</span>
        </h1>
        <p className="text-sm opacity-50 mb-4">DDP vs FSDP vs QLoRA — Step-by-Step Visual Explainer</p>
        <ModelSpec />
        <Legend />
      </div>
      <TabBar mode={mode} setMode={setMode} setStep={setStep} />
      {mode === 'ddp' && <StepView steps={DDP_STEPS} mode="ddp" />}
      {mode === 'fsdp' && <StepView steps={FSDP_STEPS} mode="fsdp" />}
      {mode === 'bnb_ddp' && <StepView steps={BNB_DDP_STEPS} mode="bnb_ddp" />}
      {mode === 'bnb_fsdp' && <StepView steps={BNB_FSDP_STEPS} mode="bnb_fsdp" />}
      {mode === 'compare' && <CompareView />}
      <div className="text-center mt-10 pt-6 opacity-30 text-xs" style={{ borderTop:'1px solid #1e293b' }}>
        <p>DDP = Distributed Data Parallel &nbsp;|&nbsp; FSDP = Fully Sharded Data Parallel &nbsp;|&nbsp; QLoRA = Quantized Low-Rank Adaptation</p>
        <p className="mt-1">Adam = Adaptive Moment Estimation &nbsp;|&nbsp; NF4 = 4-bit NormalFloat (bitsandbytes)</p>
        <p className="mt-1">Model: Qwen2.5-7B &nbsp;|&nbsp; GPU: 4× NVIDIA T4 (16 GB) &nbsp;|&nbsp; Optimizer: Adam (FP32)</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
