const TRAINING_RUNTIME_YAML = `apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: decoder-sft-training-runtime
  labels:
    trainer.kubeflow.org/framework: torch
spec:
  mlPolicy:
    numNodes: 1
    torch:
      numProcPerNode: 4
  template:
    spec:
      replicatedJobs:
        - name: node
          template:
            spec:
              template:
                spec:
                  restartPolicy: OnFailure
                  nodeSelector:
                    nvidia.com/gpu.present: "true"
                  tolerations:
                  - effect: NoSchedule
                    key: nvidia.com/gpu
                    operator: Exists
                  initContainers:
                  - name: data-loader
                    image: quay.io/balki404/sdg-intent-classifier-data:04mar-1
                    command:
                    - sh
                    - -c
                    - |
                      cp /app/training.jsonl /shared-data/training.jsonl
                    volumeMounts:
                    - name: shared-data-volume
                      mountPath: /shared-data
                  containers:
                  - name: node
                    image: registry.redhat.io/rhoai/odh-training-cuda128-torch28-py312-rhel9:v3.0
                    resources:
                      limits:
                        nvidia.com/gpu: "4"
                        memory: "32Gi"
                        cpu: "8"
                      requests:
                        nvidia.com/gpu: "4"
                        memory: "16Gi"
                        cpu: "4"
                    env:
                    - name: HF_HUB_CACHE
                      value: /mnt/hf_cache/hub
                    - name: PYTORCH_CUDA_ALLOC_CONF
                      value: "expandable_segments:True"
                    - name: HF_MODULES_CACHE
                      value: /tmp/hf_modules
                    - name: HF_DATASETS_CACHE
                      value: /tmp/hf_datasets
                    - name: HF_HOME
                      value: /tmp/hf_home_base
                    envFrom:
                    - configMapRef:
                        name: decoder-sft-train-args
                    - secretRef:
                        name: hf-secret
                    volumeMounts:
                    - mountPath: /app/train.py
                      name: train-script-volume
                      subPath: train.py
                    - mountPath: /app/training.jsonl
                      name: shared-data-volume
                      subPath: training.jsonl
                    - mountPath: /mnt/data
                      name: adapters-volume
                    - mountPath: /mnt/hf_cache
                      name: hf-cache-volume
                  volumes:
                  - name: train-script-volume
                    configMap:
                      name: decoder-sft-train-script
                  - name: shared-data-volume
                    emptyDir: {}
                  - name: adapters-volume
                    persistentVolumeClaim:
                      claimName: lora-adapters-pvc
                  - name: hf-cache-volume
                    persistentVolumeClaim:
                      claimName: hf-model-cache-pvc`;

const TRAINJOB_YAML = `apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: decoder-sft-trainjob
spec:
  runtimeRef:
    name: decoder-sft-training-runtime
    kind: TrainingRuntime
    apiGroup: trainer.kubeflow.org
  trainer:
    numNodes: 1
    command:
      - bash
      - -c
      - |
        echo "installing dependencies..."
        pip install -q scipy==1.17.0 \\
          "git+https://github.com/red-hat-data-services/mlflow@rhoai-3.3"

        echo "starting training..."
        torchrun --nproc_per_node=4 /app/train.py \\
          --model_name "\${MODEL_NAME}" \\
          --data_path "/app/training.jsonl" \\
          --output_dir "\${OUTPUT_DIR}" \\
          --dataset_source "\${DATASET_SOURCE}" \\
          --run_name "\${MLFLOW_RUN_NAME}"
    env:
      - name: DATASET_SOURCE
        value: "s3://my-enterprise-bucket/intent-data/training.jsonl"
      - name: MLFLOW_TRACKING_URI
        value: https://mlflow.redhat-ods-applications.svc.cluster.local:8443
      - name: MLFLOW_EXPERIMENT_NAME
        value: decoder-sft-qwen-intent-finetuning
      - name: MLFLOW_RUN_NAME
        value: decoder-sft-qwen-1k-run-v1
      - name: MLFLOW_TRACKING_TOKEN
        value: <<token>>
      - name: MLFLOW_TRACKING_INSECURE_TLS
        value: "true"
      - name: MLFLOW_WORKSPACE
        value: decoder-sft`;

function YamlViewer({ yaml, highlightedLines, highlightColor }) {
  const lines = yaml.split('\n');
  const hlColor = highlightColor || 'highlighted';
  return (
    <div className="rounded-xl border border-slate-700/60 bg-[#0b1121] overflow-hidden">
      <div className="flex items-center gap-2 px-4 py-2 bg-slate-800/40 border-b border-slate-700/40">
        <div className="w-2.5 h-2.5 rounded-full bg-red-500/60"></div>
        <div className="w-2.5 h-2.5 rounded-full bg-yellow-500/60"></div>
        <div className="w-2.5 h-2.5 rounded-full bg-green-500/60"></div>
        <span className="mono text-[10px] text-slate-500 ml-2">YAML</span>
      </div>
      <div className="overflow-x-auto p-0" style={{ maxHeight: '520px', overflowY: 'auto' }}>
        {lines.map((line, i) => {
          const lineNum = i + 1;
          const isHL = highlightedLines && highlightedLines.includes(lineNum);
          return (
            <div key={i} className={`yaml-line flex px-2 py-[1px] ${isHL ? hlColor : ''}`}>
              <span className="mono text-[10px] text-slate-600 w-8 text-right mr-3 select-none flex-shrink-0">{lineNum}</span>
              <span className="mono text-[11px] whitespace-pre" style={{ color: colorizeYaml(line) }}>{line}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function colorizeYaml(line) {
  if (line.trim().startsWith('#')) return '#6b7280';
  if (line.trim().startsWith('- ')) return '#a5b4fc';
  if (/^\s*(apiVersion|kind|metadata|spec|name|labels|template|containers|initContainers|volumes|env|envFrom|resources|volumeMounts):/.test(line)) return '#93c5fd';
  if (/:\s*"[^"]*"/.test(line) || /:\s*'[^']*'/.test(line)) return '#fde68a';
  if (/:\s*\d+/.test(line)) return '#86efac';
  return '#cbd5e1';
}

function DetailCard({ detail, color }) {
  return (
    <div className="flex gap-3 items-start py-2 px-3 rounded-lg bg-slate-800/30 border border-slate-700/30">
      <div className="w-1 h-full rounded-full flex-shrink-0 self-stretch" style={{ background: color, minHeight: '24px' }}></div>

          <span className="mono text-[10px] text-slate-400 break-all">{detail.value}</span>
        </div>
        <div className="text-[10px] text-slate-500 mt-0.5">{detail.note}</div>
      </div>
    </div>
  );
}

function SectionBadge({ icon, color, size }) {
  const sz = size || 36;
  return (
    <div className="flex items-center justify-center rounded-lg mono text-[10px] font-bold flex-shrink-0"
      style={{ width: sz, height: sz, background: `${color}20`, color: color, border: `1px solid ${color}40` }}>
      {icon}
    </div>
  );
}
